# docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: cerebro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cerebro_admin
      POSTGRES_PASSWORD: cerebro_dev_2026
      POSTGRES_DB: cerebro_db
    ports:
      - "5432:5432"
    volumes:
      - cerebro_pgdata:/var/lib/postgresql/data
      - ./cerebro_backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerebro_admin -d cerebro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cerebro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cerebro_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cerebro_pgdata:
    driver: local
  cerebro_redis_data:
    driver: local
